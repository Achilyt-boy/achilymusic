<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Spotify PRO</title>

  <link rel="stylesheet" href="style.css"/>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="icon" type="image/png" href="/logo.png"/>
  <meta name="theme-color" content="#1DB954"/>

</head>

<body>

  <div id="authContainer" class="auth-container">

    <div class="left-panel">

      <div class="brand">🎵 Spotify PRO</div>
      <div class="title">Login / Register</div>

      <div class="form-group">
        <label>Name</label>
        <input type="text" id="name" placeholder="Enter your name"/>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="Enter your email"/>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter your password"/>
      </div>

      <div class="btn-row">
        <button class="register-btn" onclick="register()">Register</button>
        <button class="login-btn" onclick="login()">Login</button>
      </div>

    </div>

    <div class="right-panel"></div>

  </div>

  <div id="app" style="display:none;">

    <header class="topbar">

      <div class="logo">🎵 Spotify PRO</div>

      <div class="nav-buttons">
        <button onclick="goBack()">back</button>
        <button onclick="goHome()">Home</button>
      </div>

      <button class="logout-btn" onclick="logout()">Logout</button>

    </header>

    <div class="search-bar">

      <input type="text" id="searchInput" placeholder="Search songs..."/>

      <button onclick="searchSongs()">Search</button>
      <button onclick="showFavorites()">❤️ Favorites</button>
      <button onclick="showRecent()">🕒 Recent</button>

    </div>

    <div id="songsContainer" class="songs-grid"></div>

    <div class="player">

      <img id="playerImg"/>

      <div class="player-info">
        <h3 id="playerTitle">No song playing</h3>
        <p id="playerArtist"></p>
      </div>

      <div class="controls">
        <button onclick="prevSong()">⏮</button>
        <button id="playBtn" onclick="togglePlay()">▶</button>
        <button onclick="nextSong()">⏭</button>
      </div>

      <input type="range" id="progress" value="0"/>

      <input type="range" id="volume" min="0" max="1" step="0.1" value="1"/>

    </div>

  </div>

  <script src="dist/script.js"></script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/sw.js");
    }
  </script>

</body>
</html>
